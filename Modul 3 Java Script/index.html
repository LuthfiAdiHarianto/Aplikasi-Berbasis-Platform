<!DOCTYPE html>
<html>
<head>
    <title>Advanced Layout - Updated</title>

    <link rel="stylesheet" href="tugas 1.4.css">

</head>
<body>

<div class="container">

    <div class="top">
        <div class="logo">Logo</div>
        <div class="banner"></div>
    </div>

    <div class="main">

        <div class="sidebar">Navigasi</div>

        <div class="center">

            <div class="content-top"></div>

            <div class="middle-area">
                <div class="content-bottom"></div>
                <div class="right-box" id="target-box"></div>
            </div>

        </div>

    </div>

    <div class="action-area">
    <p id="target-text" style="text-align: left;">
        Teks ini akan berubah perataannya saat kamu klik tombol pertama.
    </p>

    <button onclick="changeAlignment()">Ubah Alignment Teks</button>
    <button onclick="toggleColor()">Ubah Warna Box Kanan</button>

    <br><br>

    <button onclick="showResult()">Tampilkan Hasil Perhitungan</button>

    <p id="result"></p>
</div>

    <div class="divider"></div>

</div>

<script src="1.4 Exercise.js"></script>

</body>
</html>
