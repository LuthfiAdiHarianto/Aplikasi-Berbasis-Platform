<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Media</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>
            <span class="text-blue">ONLINE</span>
            <span class="text-orange">MEDIA</span>
        </h1>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <ul>
            <li>HOME</li>
            <li>STRATEGY</li>
            <li>SOLUSI</li>
            <li>MARKETING</li>
            <li>WORKSHOP</li>
            <li>OUR WORK</li>
            <li>PRODUK</li>
            <li>PARTNER</li>
            <li>INSPIRASI</li>
            <li>FAQ</li>
        </ul>
    </nav>

    <!-- GRID CONTENT -->
    <section class="grid">
        
        <div class="box bg-green">
            <i class="fa-solid fa-chart-pie"></i>
            <h3>Analytic</h3>
        </div>

        <div class="box bg-orange">
            <i class="fa-solid fa-thermometer-half"></i>
            <h3>Creative</h3>
        </div>

        <div class="box bg-red">
            <i class="fa-solid fa-desktop"></i>
            <h3>Development</h3>
        </div>

        <div class="box bg-blue">
            <i class="fa-solid fa-gears"></i>
            <h3>Marketing</h3>
        </div>

        <div class="box bg-yellow">
            <i class="fa-solid fa-circle-play"></i>
            <h3>Media</h3>
        </div>

        <div class="box bg-green">
            <i class="fa-solid fa-rocket"></i>
            <h3>Optimization</h3>
        </div>

    </section>

</body>
</html>
