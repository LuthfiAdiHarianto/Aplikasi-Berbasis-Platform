<!DOCTYPE html>
<html>
<head>
    <title>Layout Final</title>
    <style>

        body {
            background: #dcdcdc;
            display: flex;
            justify-content: center;
            padding: 40px;
            font-family: Arial;
        }

        .container {
            width: 850px;
            background: #efefef;
            padding: 25px;
            border: 2px solid #999;
        }

        /* ===== TOP ===== */
        .top {
            display: flex;
            gap: 20px;
        }

        .logo {
            width: 140px;
            height: 120px;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner {
            flex: 1;
            height: 120px;
            background: #888;
        }

        /* ===== MAIN ===== */
        .main {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* LEFT NAV */
        .sidebar {
            width: 140px;
            height: 420px;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CENTER AREA */
        .center {
            flex: 1;
        }

        .content-top {
            height: 100px;
            border: 2px solid #666;
            background: repeating-linear-gradient(
                to bottom,
                #999 0px,
                #999 1px,
                transparent 1px,
                transparent 20px
            );
            margin-bottom: 20px;
        }

        .middle-area {
            display: flex;
            gap: 20px;
        }

        .content-bottom {
            flex: 1;
            height: 300px;
            border: 2px solid #666;
            background: repeating-linear-gradient(
                to bottom,
                #999 0px,
                #999 1px,
                transparent 1px,
                transparent 20px
            );
        }

        .right-box {
            width: 200px;
            height: 200px;
            background: #888;
        }

        /* ===== FOOTER LINE ===== */
        .divider {
            height: 6px;
            background: black;
            margin-top: 30px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- TOP -->
    <div class="top">
        <div class="logo">Logo</div>
        <div class="banner"></div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="sidebar">Navigasi</div>

        <div class="center">

            <div class="content-top"></div>

            <div class="middle-area">
                <div class="content-bottom"></div>
                <div class="right-box"></div>
            </div>

        </div>

    </div>

    <div class="divider"></div>

</div>

</body>
</html>
